services:
  chatmock:
    restart: unless-stopped
    image: ${CHATMOCK_IMAGE:-storagetime/chatmock:latest}
    container_name: ${CHATMOCK_CONTAINER_NAME:-chatmock}
    command: ["serve"]
    env_file: .env
    environment:
      - CHATGPT_LOCAL_HOME=${CHATGPT_LOCAL_HOME:-/data}
      - CHATGPT_LOCAL_PROMPT_DIR=${CHATMOCK_PROMPT_DIR:-/app/prompts/bare}
      - CHATGPT_LOCAL_PROMPT_CONFIG=${CHATMOCK_PROMPT_CONFIG:-/data/prompt-config-chatmock.json}
      - CHATMOCK_ADMIN_TOKEN=${CHATMOCK_ADMIN_TOKEN:-}
    ports:
      - "${CHATMOCK_BIND_HOST:-127.0.0.1}:${PORT:-8000}:8000"
    volumes:
      - chatmock_data:${CHATGPT_LOCAL_HOME:-/data}
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\" "]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  chatmock-clawmem:
    restart: unless-stopped
    image: ${CHATMOCK_IMAGE:-storagetime/chatmock:latest}
    container_name: ${CHATMOCK_CLAWMEM_CONTAINER_NAME:-chatmock-clawmem}
    command: ["serve"]
    env_file: .env
    environment:
      - CHATGPT_LOCAL_HOME=${CHATGPT_LOCAL_HOME:-/data}
      - CHATGPT_LOCAL_PROMPT_DIR=${CHATMOCK_CLAWMEM_PROMPT_DIR:-/app/prompts/clawmem}
      - CHATGPT_LOCAL_PROMPT_CONFIG=${CHATMOCK_CLAWMEM_PROMPT_CONFIG:-/data/prompt-config-chatmock-clawmem.json}
      - CHATMOCK_ADMIN_TOKEN=${CHATMOCK_ADMIN_TOKEN:-}
    ports:
      - "${CHATMOCK_CLAWMEM_BIND_HOST:-127.0.0.1}:${CHATMOCK_CLAWMEM_PORT:-8001}:8000"
    volumes:
      - chatmock_data:${CHATGPT_LOCAL_HOME:-/data}
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\" "]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  chatmock-login:
    image: ${CHATMOCK_IMAGE:-storagetime/chatmock:latest}
    profiles: ["login"]
    command: ["login"]
    environment:
      - CHATGPT_LOCAL_HOME=${CHATGPT_LOCAL_HOME:-/data}
      - CHATGPT_LOCAL_LOGIN_BIND=${CHATGPT_LOCAL_LOGIN_BIND:-0.0.0.0}
    volumes:
      - chatmock_data:${CHATGPT_LOCAL_HOME:-/data}
    ports:
      - "${CHATMOCK_BIND_HOST:-127.0.0.1}:${CHATMOCK_LOGIN_PORT:-1455}:1455"

volumes:
  chatmock_data:
